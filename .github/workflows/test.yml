name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cinescope_test
          POSTGRES_PASSWORD: cinescope_test
          POSTGRES_DB: cinescope_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U cinescope_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test

      - name: Push schema to test DB
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test

      - name: Run unit/integration tests
        run: npm test
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test
          JWT_SECRET: ci-test-secret
          NODE_ENV: test

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://cinescope_test:cinescope_test@localhost:5433/cinescope_test
          JWT_SECRET: ci-e2e-secret
          NODE_ENV: test
          ENABLE_TEST_ENDPOINTS: "1"
          AUTO_PROVISION: "false"
          E2E_PORT: "4444"

      - name: TypeScript type check
        run: npx tsc --noEmit
