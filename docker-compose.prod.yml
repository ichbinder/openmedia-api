services:
  caddy:
    build:
      context: ./caddy
    image: openmedia-caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      HETZNER_API_TOKEN: ${HETZNER_API_TOKEN}
      DL_AUTH_USER: ${DL_AUTH_USER}
      DL_AUTH_HASH: ${DL_AUTH_HASH}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/dl-backends.map:/etc/caddy/dl-backends.map
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: openmedia-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      # Absolute path to the openmedia-api repo checkout on the production server.
      context: /opt/openmedia-api
    image: openmedia-api:latest
    container_name: openmedia-api
    environment:
      PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      HETZNER_API_TOKEN: ${HETZNER_API_TOKEN}
      HETZNER_NETWORK_ID: ${HETZNER_NETWORK_ID}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-}
      HETZNER_SSH_KEY_NAME: ${HETZNER_SSH_KEY_NAME}
      AUTO_PROVISION: ${AUTO_PROVISION}
      DOWNLOADER_DOCKER_IMAGE: ${DOWNLOADER_DOCKER_IMAGE}
      NZB_SERVICE_URL: ${NZB_SERVICE_URL}
      NZB_SERVICE_TOKEN: ${NZB_SERVICE_TOKEN:-}
      # Required env vars — fail fast if not set so misconfiguration is obvious
      NZB_API_URL: ${NZB_API_URL:?NZB_API_URL is required}
      API_BASE_URL: ${API_BASE_URL:?API_BASE_URL is required}
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN:?SERVICE_API_TOKEN is required}
      USENET_SERVERS: ${USENET_SERVERS:?USENET_SERVERS is required}
      # Upload-VPS Usenet Provider Config (used by uploads.ts auto-upload)
      USENET_PROVIDER_1_HOST: ${USENET_PROVIDER_1_HOST:-}
      USENET_PROVIDER_1_PORT: ${USENET_PROVIDER_1_PORT:-563}
      USENET_PROVIDER_1_USER: ${USENET_PROVIDER_1_USER:-}
      USENET_PROVIDER_1_PASS: ${USENET_PROVIDER_1_PASS:-}
      USENET_PROVIDER_1_SSL: ${USENET_PROVIDER_1_SSL:-1}
      USENET_PROVIDER_1_CONNS: ${USENET_PROVIDER_1_CONNS:-10}
      USENET_PROVIDER_2_HOST: ${USENET_PROVIDER_2_HOST:-}
      USENET_PROVIDER_2_PORT: ${USENET_PROVIDER_2_PORT:-563}
      USENET_PROVIDER_2_USER: ${USENET_PROVIDER_2_USER:-}
      USENET_PROVIDER_2_PASS: ${USENET_PROVIDER_2_PASS:-}
      USENET_PROVIDER_2_SSL: ${USENET_PROVIDER_2_SSL:-1}
      USENET_PROVIDER_2_CONNS: ${USENET_PROVIDER_2_CONNS:-10}
      USENET_PROVIDER_3_HOST: ${USENET_PROVIDER_3_HOST:-}
      USENET_PROVIDER_3_PORT: ${USENET_PROVIDER_3_PORT:-563}
      USENET_PROVIDER_3_USER: ${USENET_PROVIDER_3_USER:-}
      USENET_PROVIDER_3_PASS: ${USENET_PROVIDER_3_PASS:-}
      USENET_PROVIDER_3_SSL: ${USENET_PROVIDER_3_SSL:-1}
      USENET_PROVIDER_3_CONNS: ${USENET_PROVIDER_3_CONNS:-10}
      # Optional — TMDB matching falls back gracefully if not set
      TMDB_API_KEY: ${TMDB_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./caddy/dl-backends.map:/etc/caddy/dl-backends.map
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      # Absolute path to the openmedia-web repo checkout on the production server.
      # This file is intended for use on the Hetzner production VPS only.
      context: /opt/openmedia-web
      args:
        BACKEND_URL: ${BACKEND_URL}
        TMDB_API_KEY: ${TMDB_API_KEY}
    image: openmedia-web:latest
    container_name: openmedia-web
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  pgdata:
